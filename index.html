<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nephro Charges">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f766e">

<title>Nephro Charge Capture</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f4f6f9;--bg3:#e8ecf2;
  --tx:#0f172a;--tx2:#64748b;--tx3:#94a3b8;
  --bd:#e2e8f0;--bd2:#cbd5e1;
  --blue:#2563eb;--blue2:#eff6ff;--blue3:#bfdbfe;
  --green:#16a34a;--green2:#f0fdf4;--green3:#bbf7d0;
  --amber:#b45309;--amber2:#fffbeb;--amber3:#fde68a;
  --red:#dc2626;--red2:#fef2f2;--red3:#fecaca;
  --purple:#7c3aed;--purple2:#f5f3ff;--purple3:#ddd6fe;
  --teal:#0f766e;--teal2:#f0fdfa;--teal3:#99f6e4;
  --r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e293b;--bg2:#0f172a;--bg3:#334155;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;
  --bd:#334155;--bd2:#475569;
  --blue:#60a5fa;--blue2:#1e3a5f;--blue3:#1e40af;
  --green:#4ade80;--green2:#14532d;--green3:#166534;
  --amber:#fbbf24;--amber2:#451a03;--amber3:#78350f;
  --red:#f87171;--red2:#450a0a;--red3:#7f1d1d;
  --purple:#a78bfa;--purple2:#2e1065;--purple3:#4c1d95;
  --teal:#2dd4bf;--teal2:#042f2e;--teal3:#134e4a;
}}
html,body{min-height:100%;background:var(--bg2);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20}
.brand{font-size:15px;font-weight:700}.brand-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.tbar-right{display:flex;gap:7px;align-items:center}
.icon-btn{width:34px;height:34px;border:none;border-radius:var(--rs);background:var(--bg2);color:var(--tx2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bottomnav{display:flex;border-top:1px solid var(--bd);background:var(--bg);position:sticky;bottom:0;z-index:20}
.nb{flex:1;padding:11px 4px 9px;font-size:11px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--tx3);display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit}
.nb.on{color:var(--blue)}.nb-icon{font-size:20px;line-height:1}
.page{flex:1;padding:14px 16px;padding-bottom:90px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sec{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tx2);margin:18px 0 9px}
.sec.first{margin-top:0}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:inherit;-webkit-appearance:none;transition:opacity .1s}
.btn:active{opacity:.65}
.btn.blue{background:var(--blue2);color:var(--blue);border-color:var(--blue3)}
.btn.green{background:var(--green2);color:var(--green);border-color:var(--green3)}
.btn.red{background:var(--red2);color:var(--red);border-color:var(--red3)}
.btn.amber{background:var(--amber2);color:var(--amber);border-color:var(--amber3)}
.btn.purple{background:var(--purple2);color:var(--purple);border-color:var(--purple3)}
.btn.teal{background:var(--teal2);color:var(--teal);border-color:var(--teal3)}
.btn.sm{padding:6px 12px;font-size:12px}.btn.xs{padding:4px 9px;font-size:11px;font-weight:600}
.btn.block{width:100%;padding:13px}.btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.field{margin-bottom:11px}.field label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.inp{width:100%;padding:9px 12px;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:14px;font-family:inherit;-webkit-appearance:none}
.inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.inp{resize:vertical;min-height:64px;line-height:1.5}
.sel{width:100%;padding:9px 12px;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:14px;font-family:inherit;-webkit-appearance:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:monospace}
.pill.blue{background:var(--blue2);color:var(--blue);border:1px solid var(--blue3)}
.pill.green{background:var(--green2);color:var(--green);border:1px solid var(--green3)}
.pill.gdash{background:var(--green2);color:var(--green);border:1px dashed var(--green3)}
.pill.purple{background:var(--purple2);color:var(--purple);border:1px solid var(--purple3)}
.px{cursor:pointer;font-size:15px;line-height:1;opacity:.55}.px:active{opacity:1}
.listbox{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;max-height:210px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.lrow{display:flex;align-items:center;gap:10px;padding:9px 10px;cursor:pointer;border-bottom:1px solid var(--bd)}
.lrow:last-child{border-bottom:none}.lrow:active{background:var(--bg3)}.lrow.on{background:var(--blue2)}
.lcode{font-size:12px;font-weight:700;font-family:monospace;min-width:56px;color:var(--blue)}
.ldesc{font-size:13px;color:var(--tx2);flex:1;line-height:1.3}.lrow.on .ldesc{color:var(--blue)}
.chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent}
.lrow.on .chk{background:var(--blue);border-color:var(--blue);color:#fff}
.cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:9px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.ctab{padding:6px 13px;font-size:12px;font-weight:500;border:1px solid var(--bd);border-radius:20px;background:var(--bg);color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.ctab.on{background:var(--blue2);color:var(--blue);border-color:var(--blue3)}
.modcard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px}
.modrow{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.modsel{padding:5px 9px;font-size:12px;border:1px solid var(--bd2);border-radius:6px;background:var(--bg);color:var(--tx);font-family:inherit;flex:1;min-width:0;-webkit-appearance:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.drag{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.toast{padding:11px 14px;border-radius:var(--rs);margin-bottom:12px;font-size:13px;font-weight:600}
.toast.green{background:var(--green2);color:var(--green);border:1px solid var(--green3)}
.toast.blue{background:var(--blue2);color:var(--blue);border:1px solid var(--blue3)}
.toast.amber{background:var(--amber2);color:var(--amber);border:1px solid var(--amber3)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg2);border-radius:var(--rs);padding:12px;text-align:center;border:1px solid var(--bd)}
.stat-n{font-size:26px;font-weight:700}.stat-l{font-size:11px;color:var(--tx2);margin-top:2px}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.pthdr{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:14px}
.back{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--tx2);background:none;border:none;cursor:pointer;padding:0;margin-bottom:14px;font-weight:500;font-family:inherit}
.ptactions{display:flex;gap:7px;margin-top:11px;padding-top:10px;border-top:1px solid var(--bd);flex-wrap:wrap}
/* status */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--rs);margin-bottom:14px;border:1px solid var(--bd)}
.status-bar.active{background:var(--green2);border-color:var(--green3)}
.status-bar.discharged{background:var(--amber2);border-color:var(--amber3)}
.status-label{font-size:14px;font-weight:700}
.status-bar.active .status-label{color:var(--green)}
.status-bar.discharged .status-label{color:var(--amber)}
.status-sub{font-size:12px;opacity:.8;margin-top:1px}
/* ICD panel (patient-level) */
.icd-panel{background:var(--purple2);border:1px solid var(--purple3);border-radius:var(--r);padding:13px;margin-bottom:14px}
.icd-panel-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.icd-panel-sub{font-size:12px;color:var(--purple);opacity:.8;margin-bottom:10px}
/* DOS cards */
.dos-card{border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.dos-header{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--bg2);cursor:pointer;border-bottom:1px solid var(--bd)}
.dos-header:active{background:var(--bg3)}
.dos-date{font-size:14px;font-weight:700;color:var(--tx)}
.dos-summary{font-size:12px;color:var(--tx2);margin-top:2px}
.dos-body{padding:13px}
.dos-chevron{font-size:18px;color:var(--tx2);transition:transform .2s;display:inline-block}
.dos-chevron.open{transform:rotate(180deg)}
/* upload */
.upload-zone{border:2px dashed var(--bd2);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;background:var(--bg2);transition:border-color .15s}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--blue);background:var(--blue2)}
.upload-zone input[type=file]{display:none}
.upload-icon{font-size:32px;margin-bottom:6px}
.upload-title{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px}
.upload-sub{font-size:12px;color:var(--tx2)}
.fs-preview{border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;margin-top:10px;position:relative}
.fs-preview img{width:100%;display:block}
.fs-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:20px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit}

.custom-icd{background:var(--bg2);border:2px dashed var(--bd2);border-radius:var(--r);padding:13px;margin-top:10px}
/* ICD 4-column category grid */
.icd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.icd-col{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden}
.icd-col-head{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 8px;background:var(--bg3);border-bottom:1px solid var(--bd);color:var(--tx2)}
.icd-item{display:flex;align-items:flex-start;gap:5px;padding:5px 7px;cursor:pointer;border-bottom:1px solid var(--bd)}
.icd-item:last-child{border-bottom:none}
.icd-item:active{background:var(--bg3)}.icd-item.on{background:var(--blue2)}
.icd-code{font-size:10px;font-weight:700;font-family:monospace;color:var(--blue);flex-shrink:0;padding-top:1px;min-width:44px}
.icd-desc{font-size:10px;color:var(--tx2);line-height:1.35;flex:1}
.icd-item.on .icd-desc{color:var(--blue)}
.icd-chk{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;margin-left:auto;margin-top:1px}
.icd-item.on .icd-chk{background:var(--blue);border-color:var(--blue);color:#fff}
/* CPT dropdown */
.cpt-select{width:100%;padding:9px 12px;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:14px;font-family:inherit;-webkit-appearance:none;margin-bottom:8px}
.empty{text-align:center;padding:48px 20px;color:var(--tx2)}
.empty-icon{font-size:44px;margin-bottom:12px}
.divider{height:1px;background:var(--bd);margin:16px 0}
.pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.banner{font-size:12px;color:var(--tx2);background:var(--bg2);border-top:1px solid var(--bd);padding:8px 16px;text-align:center}
.toggle-sec{display:flex;align-items:center;justify-content:space-between;margin:18px 0 9px}
.toggle-sec .sec{margin:0}
.toggle-btn{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot.active{background:var(--green)}.dot.discharged{background:var(--amber)}
/* info box */
.info-box{background:var(--blue2);border:1px solid var(--blue3);border-radius:var(--rs);padding:10px 13px;margin-bottom:12px;font-size:13px;color:var(--blue)}
</style>
</head>

function today(){return new Date().toISOString().slice(0,10);}
function calcAge(dob){
  if(!dob)return '';
  try{var d=new Date(dob+'T12:00'),n=new Date(),a=n.getFullYear()-d.getFullYear(),m=n.getMonth()-d.getMonth();if(m<0||(m===0&&n.getDate()<d.getDate()))a--;return a>=0?String(a):''}catch(e){return '';}
}
function fmtD(d){try{return new Date(d+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return d;}}
function initials(n){return(n||'').split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2)||'?';}
function getPt(id){return DB.patients.find(function(p){return p.id===id;})||null;}
function selPt(){return getPt(PID);}
function dosCount(pt){return Object.keys(pt.charges||{}).length;}
function totalCodes(pt){var n=0;Object.values(pt.charges||{}).forEach(function(c){n+=(c.cpt||[]).length;});return n;}

// ── DOM ──────────────────────────────────────────────────────────────────────
function h(tag,props,kids){
  var el=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    var v=props[k];
    if(k==='cls')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k[0]==='@')el.addEventListener(k.slice(1),v);
    else el.setAttribute(k,v);
  });
  if(kids)kids.forEach(function(c){if(c!=null&&c!==false)el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return el;
}

          h('div',{cls:'icd-chk'},[sel?'✓':'']),

    });

  // custom ICD

  return h('div',{},[f]);

function dosEditor(pt,d,dc){
  var f=document.createDocumentFragment();

  // show which ICD codes are shared from patient
  var icd=pt.icd||[];
  if(icd.length){
    var ipills=h('div',{cls:'pills',style:{marginBottom:'12px'}},[]);
    icd.forEach(function(c){
      ipills.appendChild(h('span',{cls:'pill gdash'},[c.code,' ',h('span',{style:{fontWeight:'400',fontSize:'10px',fontFamily:'sans-serif',opacity:'.75'}},[c.desc])]));
    });

      h('div',{style:{fontSize:'12px',fontWeight:'700',color:'var(--purple)',marginBottom:'6px'}},['📋 Shared diagnoses (from patient)']),
      ipills,
    ]));
  } else {
    f.appendChild(h('div',{style:{background:'var(--amber2)',border:'1px solid var(--amber3)',borderRadius:'var(--rs)',padding:'9px 12px',marginBottom:'12px',fontSize:'13px',color:'var(--amber)'}},
      ['⚠ No diagnoses set yet — scroll up to add diagnoses to this patient.']));
  }

  // CPT codes — dropdown
  f.appendChild(h('div',{cls:'sec',style:{marginTop:'0'}},['CPT codes for '+fmtD(d)]));

  // Build grouped select
  var selEl=h('select',{cls:'cpt-select'},[]);
  var defOpt=h('option',{value:''},[' — Select a CPT code — ']);
  selEl.appendChild(defOpt);
  CPTS.forEach(function(item){
    if(item.g){
      var og=h('optgroup',{label:item.g},[]);
      selEl.appendChild(og);
    } else {
      var already=!!(dc.cpt||[]).find(function(x){return x.code===item.code;});
      var o=h('option',{value:item.code},[item.code+' — '+item.desc+(already?' ✓':'')]);
      if(already) o.style.color='var(--green)';
      selEl.appendChild(o);
    }
  });
  selEl.addEventListener('change',function(){
    var code=selEl.value;
    if(!code)return;
    var item=CPTS.find(function(x){return x.code===code;});
    if(!item)return;
    if(!(dc.cpt||[]).find(function(x){return x.code===code;})){
      if(!dc.cpt)dc.cpt=[];
      dc.cpt.push({code:item.code,desc:item.desc,mod:''});
      saveDOS(pt.id,d,dc);
    }
    selEl.value='';
    render();
  });

  f.appendChild(h('div',{style:{background:'var(--bg2)',border:'1px solid var(--bd)',borderRadius:'var(--rs)',padding:'10px 12px',marginBottom:'10px'}},[
    selEl,
    h('div',{style:{fontSize:'11px',color:'var(--tx2)'}},['Select a code to add it — you can add multiple codes per date']),
  ]));

  // modifiers for selected CPT
  if(dc.cpt&&dc.cpt.length){
    f.appendChild(h('div',{cls:'sec'},['Modifiers']));

      var opts=MODS.map(function(m){var o=h('option',{value:m[0]},[m[1]]);if(m[0]===(c.mod||''))o.selected=true;return o;});
      var msel=h('select',{cls:'modsel','@change':function(e){c.mod=e.target.value;saveDOS(pt.id,d,dc);}},opts);

          h('span',{style:{fontFamily:'monospace',fontSize:'14px',fontWeight:'700',color:'var(--blue)'}},[c.code]),

        ]),
        h('div',{cls:'modrow'},[
          h('span',{style:{fontSize:'12px',color:'var(--tx2)',flexShrink:'0'}},['Modifier:']),
          msel,
          c.mod?h('span',{cls:'pill blue',style:{marginLeft:'4px'}},[c.mod]):null,
        ]),
      ]));
    });
  }


  // notes
  f.appendChild(h('div',{cls:'sec'},['Notes for biller']));
  var nta=h('textarea',{cls:'inp',style:{marginBottom:'14px'},placeholder:'Optional notes for this date...'});
  nta.value=dc.notes||'';
  nta.addEventListener('input',function(){dc.notes=nta.value;saveDOS(pt.id,d,dc);});
  f.appendChild(nta);
  f.appendChild(h('button',{cls:'btn green block','@click':function(){flash('Charges saved for '+fmtD(d));}},[' ✓ Charges saved for '+fmtD(d)]));

  return h('div',{},[f]);
}

        h('button',{cls:'btn xs',style:{background:'var(--green2)',color:'var(--green)',border:'1px solid var(--green3)'},'@click':function(){exportDayCSV(d);}},['⬇ CSV']),
      ]),
    ])];

function addPatient(){

    age:NPT.age||calcAge(NPT.dob),type:NPT.type,admitDate:NPT.admitDate,

function setPtStatus(id,status){
  var pt=getPt(id);if(!pt)return;pt.status=status;save();
  flash(status==='discharged'?'Marked as discharged':'Marked as active','blue');render();
}

function openCharge(pt){
  PID=pt.id;ICDQ_PT='';

// patient-level ICD
function togglePtICD(ptId,code,desc,custom){
  var pt=getPt(ptId);if(!pt)return;
  if(!pt.icd)pt.icd=[];
  var i=pt.icd.findIndex(function(x){return x.code===code;});
  if(i>=0)pt.icd.splice(i,1);else pt.icd.push({code:code,desc:desc,custom:!!custom});
  save();render();
}
function addCustomPtICD(ptId){
  var code=ECCODE.trim().toUpperCase(),desc=ECDESC.trim();
  if(!code){ECERR='Enter a code';render();return;}
  if(!desc){ECERR='Enter a description';render();return;}
  var pt=getPt(ptId);if(!pt)return;
  if(!pt.icd)pt.icd=[];
  if(pt.icd.find(function(x){return x.code===code;})){ECERR='Already added';render();return;}
  pt.icd.push({code:code,desc:desc,custom:true});
  save();ECCODE='';ECDESC='';ECERR='';render();
}

// DOS CPT
function toggleDOSCPT(ptId,d,code,desc){
  var pt=getPt(ptId);if(!pt)return;
  if(!pt.charges)pt.charges={};
  if(!pt.charges[d])pt.charges[d]={cpt:[],notes:''};
  var dc=pt.charges[d];if(!dc.cpt)dc.cpt=[];
  var i=dc.cpt.findIndex(function(x){return x.code===code;});
  if(i>=0)dc.cpt.splice(i,1);else dc.cpt.push({code:code,desc:desc,mod:''});
  save();render();
}
function saveDOS(ptId,d,dc){
  var pt=getPt(ptId);if(!pt)return;
  if(!pt.charges)pt.charges={};
  pt.charges[d]=dc;save();
}

function downloadFacesheet(pt){

// ── CHARGE TEXT BUILDER ──────────────────────────────────────────────────────
function buildChargeText(fsIds){
  var today2=today();
  var lines=['NEPHROLOGY CHARGE CAPTURE'];
  lines.push('Practice: '+DB.cfg.practice);
  lines.push('Sent: '+fmtD(today2));
  lines.push('');

  // Facesheet note
  if(fsIds&&fsIds.length){
    var fsNames=fsIds.map(function(id){var pt=getPt(id);return pt?pt.name+(pt.room?' (Rm '+pt.room+')':''):'';}).filter(Boolean);
    if(fsNames.length){
      lines.push('⚠ PLEASE ATTACH FACESHEETS for:');
      fsNames.forEach(function(n){lines.push('  • '+n);});
      lines.push('');
    }
  }

  // Group by date of service for clean layout
  var allDOS={};
  DB.patients.forEach(function(pt){
    Object.keys(pt.charges||{}).sort().forEach(function(d){
      if(!allDOS[d])allDOS[d]=[];
      allDOS[d].push(pt);
    });
  });

  var dosKeys=Object.keys(allDOS).sort(function(a,b){return b.localeCompare(a);});

  dosKeys.forEach(function(d){
    lines.push('═══════════════════════════════');
    lines.push('DATE OF SERVICE: '+fmtD(d));
    lines.push('═══════════════════════════════');
    allDOS[d].forEach(function(pt){
      var dc=pt.charges[d];
      var tm=TM[pt.type]||TM.followup;
      lines.push('');
      lines.push('Patient : '+pt.name+(pt.age?' | Age '+pt.age:'')+(pt.room?' | Rm '+pt.room:''));
      lines.push('Type    : '+tm.label+' | '+(pt.status==='active'?'Active inpatient':'Discharged'));
      if(pt.admitDate) lines.push('Admitted: '+fmtD(pt.admitDate));
      // CPT codes
      if(dc.cpt&&dc.cpt.length){
        lines.push('CPT     : '+dc.cpt.map(function(c){return c.code+(c.mod?' ['+c.mod+']':'')+' — '+c.desc;}).join('\n          '));
      } else {
        lines.push('CPT     : (none)');
      }
      // ICD-10 — shared from patient
      if((pt.icd||[]).length){
        lines.push('ICD-10  : '+(pt.icd||[]).map(function(c){return c.code+' — '+c.desc;}).join('\n          '));
      } else {
        lines.push('ICD-10  : (none)');
      }
      if(dc.notes) lines.push('Notes   : '+dc.notes);
      lines.push('───────────────────────────────');
    });
    lines.push('');
  });

  if(!dosKeys.length){
    lines.push('No charges logged yet.');
  }

  return lines.join('\n');
}

// ── SHARE via Web Share API (opens Zoho Mail on iPhone) ───────────────────
function shareCharges(fsIds){
  // Download facesheets first with stagger
  if(fsIds&&fsIds.length){
    fsIds.forEach(function(id,i){
      setTimeout(function(){var pt=getPt(id);if(pt)downloadFacesheet(pt);},i*700);
    });
  }

  var text=buildChargeText(fsIds);
  var title='Nephrology Charges — '+fmtD(today());

  if(navigator.share){
    // Web Share API — opens iOS share sheet, Zoho Mail appears if installed
    navigator.share({title:title,text:text}).then(function(){
      flash('Charges shared ✓');
    }).catch(function(err){
      if(err.name!=='AbortError'){
        // User didn't cancel — fall back to clipboard
        copyTextToClipboard(text);
        flash('Share unavailable — copied to clipboard instead','blue');
      }
    });
  } else {
    // Desktop or unsupported browser — fall back to clipboard
    copyTextToClipboard(text);
    flash('Copied to clipboard — paste into Zoho Mail','blue');
  }
}

// ── COPY to clipboard ────────────────────────────────────────────────────────
function copyCharges(fsIds){
  if(fsIds&&fsIds.length){
    fsIds.forEach(function(id,i){
      setTimeout(function(){var pt=getPt(id);if(pt)downloadFacesheet(pt);},i*700);
    });
  }
  var text=buildChargeText(fsIds);
  copyTextToClipboard(text);
}

function copyTextToClipboard(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      flash('✓ Copied! Open Zoho Mail → New email → paste (long-press in body)','green');
    }).catch(function(){
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{
    document.execCommand('copy');
    flash('✓ Copied! Open Zoho Mail → New email → paste','green');
  }catch(e){
    flash('Could not copy automatically — please select and copy manually','amber');
  }
  document.body.removeChild(ta);
}

function shareBackup(){

function importData(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(){
    if(!inp.files||!inp.files[0])return;
    processImportFile(inp.files[0]);
  };
  inp.click();
}

function processImportFile(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var imp=JSON.parse(e.target.result);
      if(!imp.patients||!imp.cfg)throw new Error('bad format');

      var added=0,updated=0;
      imp.patients.forEach(function(p){
        var existing=DB.patients.find(function(x){return x.id===p.id;});
        if(!existing){
          // New patient — add but preserve any facesheet from current device
          DB.patients.push(p);added++;
        } else {
          // Existing patient — merge charges (imported charges + local charges, keep all)
          var mergedCharges=Object.assign({},existing.charges||{},p.charges||{});
          // Merge ICD codes (combine, deduplicate by code)
          var allICD=(existing.icd||[]).concat(p.icd||[]);
          var seenICD={};
          var mergedICD=allICD.filter(function(c){if(seenICD[c.code])return false;seenICD[c.code]=true;return true;});
          // Update fields from imported version, but keep local facesheet if present
          Object.assign(existing,p,{
            charges:mergedCharges,
            icd:mergedICD,
            facesheet:existing.facesheet||p.facesheet||null
          });
          updated++;
        }
      });
      // Update settings if imported has them
      if(imp.cfg.practice)DB.cfg.practice=imp.cfg.practice;
      if(imp.cfg.email)DB.cfg.email=imp.cfg.email;
      save();MODAL=null;
      flash('Imported: '+added+' new patient'+(added!==1?'s':'')+', '+updated+' updated','blue');
      render();
    }catch(ex){flash('Invalid backup file — check it is a .json export from this app','amber');}
  };
  reader.readAsText(file);
}

// Drag and drop import — works on desktop
function setupDragDrop(){
  document.addEventListener('dragover',function(e){
    e.preventDefault();
    document.getElementById('app').style.outline='3px dashed var(--blue)';
  });
  document.addEventListener('dragleave',function(e){
    if(!e.relatedTarget)document.getElementById('app').style.outline='';
  });
  document.addEventListener('drop',function(e){
    e.preventDefault();
    document.getElementById('app').style.outline='';
    var file=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
    if(!file)return;
    if(file.name.endsWith('.json')||file.type==='application/json'){
      processImportFile(file);
    } else {
      flash('Drop a .json backup file to import','amber');
    }
  });
}

function dlText(content,filename,mime){
  try{
    var blob=new Blob([content],{type:mime});var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=filename;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
  }catch(e){
    var w=window.open('','_blank');
    if(w){w.document.write('<pre style="font-family:monospace;font-size:12px;white-space:pre-wrap;padding:16px">'+content.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</pre><p style="font-family:sans-serif;padding:16px;color:#555">Save as <b>'+filename+'</b></p>');w.document.title=filename;}
  }
}

function flash(msg,t){clearTimeout(TOAST_T);TOAST={m:msg,t:t||'green'};render();TOAST_T=setTimeout(function(){TOAST=null;render();},3500);}

render();
setupDragDrop();
